# Lumen Model Registry
# ====================
#
# Canonical registry of models supported by the Lumen inference engine.
# Each entry specifies the model, architecture, quantization formats,
# and GGUF source for reproducible benchmarking and testing.

[meta]
schema_version = 1
last_validated = "2026-04-06"

supported_architectures = [
    "llama",      # LLaMA 2/3/3.1, CodeLlama
    "mistral",    # Mistral
    "qwen2",      # Qwen2, Qwen2.5
    "qwen35",     # Qwen3.5 (GatedDeltaNet)
    "qwen35moe",  # Qwen3.5 MoE (Metal only)
    "internlm2",  # InternLM2
    "exaone",     # EXAONE
    "xverse",     # XVERSE
]

supported_quantizations = ["F16", "Q8_0", "Q4_0"]


# =============================================================================
# Models
# =============================================================================

[models.llama-3-1-8b]
display_name = "Llama 3.1 8B Instruct"
architecture = "llama"
parameters = "8B"
tokenizer = "unsloth/Meta-Llama-3.1-8B-Instruct"

    [models.llama-3-1-8b.gguf_files]
    Q8_0 = { repo = "mradermacher/Meta-Llama-3.1-8B-Instruct-GGUF", file = "Meta-Llama-3.1-8B-Instruct.Q8_0.gguf" }
    F16  = { repo = "mradermacher/Meta-Llama-3.1-8B-Instruct-GGUF", file = "Meta-Llama-3.1-8B-Instruct.f16.gguf" }


