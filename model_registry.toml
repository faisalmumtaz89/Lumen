# Lumen Model Registry
# ====================
#
# Canonical registry of models supported by the Lumen inference engine.
# Lumen targets Qwen3.5-9B exclusively as the production model. Additional
# Qwen3.5 family members may be added here later; non-Qwen3.5 architectures
# are not supported and will be rejected at conversion time.

[meta]
schema_version = 1
last_validated = "2026-05-17"
default_quant = "Q8_0"

supported_architectures = [
    "qwen35",     # Qwen3.5 (GatedDeltaNet, dense FFN)
    "qwen35moe",  # Qwen3.5 MoE (GatedDeltaNet, sparse FFN)
]

supported_quantizations = ["BF16", "F16", "Q8_0", "Q4_0"]


# =============================================================================
# Models
# =============================================================================

[models.qwen3-5-9b]
display_name = "Qwen3.5 9B"
architecture = "qwen35"
parameters = "9B"
tokenizer = "Qwen/Qwen3.5-9B"

    [models.qwen3-5-9b.gguf_files]
    Q8_0 = { repo = "bartowski/Qwen_Qwen3.5-9B-GGUF", file = "Qwen_Qwen3.5-9B-Q8_0.gguf" }


[models.qwen3-5-moe-35b-a3b]
display_name = "Qwen3.5 MoE 35B-A3B"
architecture = "qwen35moe"
parameters = "35B-A3B"
tokenizer = "Qwen/Qwen3.5-35B-A3B"

    [models.qwen3-5-moe-35b-a3b.gguf_files]
    Q8_0 = { repo = "bartowski/Qwen_Qwen3.5-35B-A3B-GGUF", file = "Qwen_Qwen3.5-35B-A3B-Q8_0.gguf" }
    # Q4_0 entry — same provider, Q4_0 quant.
    Q4_0 = { repo = "bartowski/Qwen_Qwen3.5-35B-A3B-GGUF", file = "Qwen_Qwen3.5-35B-A3B-Q4_0.gguf" }
    # BF16 ships as a 2-shard split GGUF (~39 GB + ~31 GB = ~70 GB)
    # because HuggingFace caps single GGUFs at ~50 GB. The multi-shard reader
    # auto-discovers the second shard from the first; both filenames are
    # declared here so the CLI can pre-fetch every shard before conversion.
    # Note: bartowski's repo nests BF16 inside a subdirectory
    # (`Qwen_Qwen3.5-35B-A3B-bf16/`). Local cache must keep shards adjacent
    # (flat or both inside the same subdir); fresh-download support for this
    # nested layout is deferred (current `download_gguf` rejects '/' in
    # filenames for path-traversal safety).
    BF16 = { repo = "bartowski/Qwen_Qwen3.5-35B-A3B-GGUF", files = [
        "Qwen_Qwen3.5-35B-A3B-bf16-00001-of-00002.gguf",
        "Qwen_Qwen3.5-35B-A3B-bf16-00002-of-00002.gguf",
    ] }


# =============================================================================
# Aliases -- short names mapping to canonical model keys
# =============================================================================

[aliases]
"qwen3.5-9b" = "qwen3-5-9b"
"qwen3.5-moe-35b-a3b" = "qwen3-5-moe-35b-a3b"
"qwen3.5-moe" = "qwen3-5-moe-35b-a3b"
